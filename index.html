<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <script defer src="script.js"></script>
    <title>Our Life in Weeks App</title>
</head>
<body>

   
   <div class="container">
      <h1>Our Life In Weeks</h1>
      <p>Assuming that we are lucky enough to live in 90 years</p>

      <div id="displayResult">
          <div class="answer">
              <p>You have</p>
              <h2 id="result">0</h2>
              <p>weeks left...</p>
          </div>
          <div class="alert">
              <p>Please enter your age below...</p>
          </div>
          <div class="alert2">
              <p>Please enter a number...</p>
          </div>
      </div>

      <div class="buttons">
          <input type="text" id="ageInput" placeholder="Enter your age">
          <button id="calcBtn">Calculate</button>
          <button id="resetBtn">Reset</button>
          <a href="index.html" class="refresh">Refresh</a>
      </div>
  </div>



    
</body>
</html>
